name: Decode generated scene assets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/decode-scene-assets.yml'
      - 'asset_upload/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode generated WebP assets
        shell: bash
        run: |
          shopt -s nullglob
          files=(asset_upload/*.b64)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No staged assets"
            exit 0
          fi
          mkdir -p assets/images
          for file in "${files[@]}"; do
            name="$(basename "$file" .b64)"
            base64 --decode "$file" > "assets/images/$name"
          done
          rm -rf asset_upload
      - name: Commit generated assets
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add generated censored intimacy illustrations"
          git push
