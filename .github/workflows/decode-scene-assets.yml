name: Decode generated scene assets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/decode-scene-assets.yml'
      - 'asset_upload/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install generated scene art
        shell: bash
        run: |
          shopt -s nullglob
          parts=(asset_upload/scene-art.tar.gz.part-*)
          if [ ${#parts[@]} -gt 0 ]; then
            cat "${parts[@]}" > /tmp/scene-art.tar.gz
            tar -xzf /tmp/scene-art.tar.gz
          elif [ -f asset_upload/scene-art.tar.gz ]; then
            tar -xzf asset_upload/scene-art.tar.gz
          fi
          files=(asset_upload/*.b64)
          if [ ${#files[@]} -gt 0 ]; then
            mkdir -p assets/images
            for file in "${files[@]}"; do
              name="$(basename "$file" .b64)"
              base64 --decode "$file" > "assets/images/$name"
            done
          fi
          rm -rf asset_upload
      - name: Commit generated assets
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install unique artwork for every story scene"
          git push
